name: CI

# Fast feedback on every push/PR: Python tests + lint, and a site build.
# The expensive data pipeline + Pages deploy lives in deploy.yml, not here.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python — tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install package (dev extras)
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests
      - name: Pytest
        run: pytest -q

  site:
    name: Site — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      # `npm run build` runs `tsc -b && vite build`, so this also typechecks.
      - run: npm run build
